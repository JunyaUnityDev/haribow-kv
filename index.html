<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HARIBOW — Go Beyond</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:-apple-system,sans-serif}
  #c{display:block;width:100vw;height:100vh}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#889;letter-spacing:.3em;font-size:12px;background:#000;transition:opacity .8s;z-index:5}
  #hint{position:fixed;left:0;right:0;bottom:24px;text-align:center;color:#cbd6ff;font-size:11px;letter-spacing:.25em;opacity:0;transition:opacity 1s;z-index:4;pointer-events:none}
  #enter{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(0,0,0,.55);z-index:6;cursor:pointer;transition:opacity .7s}
  #enter .et{color:#fff;font-size:13px;letter-spacing:.6em;font-weight:600}
  #enter .eb{color:#cbd6ff;font-size:11px;letter-spacing:.35em;border:1px solid #4a5570;padding:12px 26px;border-radius:40px}
</style>
</head>
<body>
<div id="load">L O A D I N G</div>
<div id="enter"><div class="et">HARIBOW</div><div class="eb">TAP TO ENTER</div></div>
<div id="hint">スマホを傾けて / TILT &amp; TOUCH</div>
<canvas id="c"></canvas>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
const errShow=m=>{const l=document.getElementById('load');if(l){l.textContent='ERR: '+m;l.style.opacity=1;l.style.display='flex';}};
window.onerror=(m,s,ln)=>errShow(m+' @'+ln);
addEventListener('unhandledrejection',e=>errShow('REJ '+(e.reason&&e.reason.message||e.reason)));

const CFG = { shiftY: 0.0, bloom:0.55, dust:1500, dur:20.0, revEnd:4.0 };
let F=1600, W=1600, Hext=1589, CY=794;   // 実写背景(scene.jsonから上書き)
let VW=innerWidth, VH=innerHeight, forceAspect=null;   // レンダ実寸(編集モードのアスペクト固定用)
let camEdit={on:false, t:8, playing:false}, _fc=0;     // カメラ動き編集(タイムライン)
const dZ = dn => 2.0 + (1.0-dn)*7.0;

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x000000);
const camera = new THREE.PerspectiveCamera(59.66, innerWidth/innerHeight, 0.05, 60);  // 拡張フレーム全体=引き
camera.position.set(0,0,-8.5);
function applyShift(){ camera.updateProjectionMatrix(); camera.projectionMatrix.elements[9]=CFG.shiftY; }

const loader = new THREE.TextureLoader();
const load = url => new Promise(res=>loader.load(url,t=>{t.colorSpace=THREE.SRGBColorSpace;res(t);}));
function loadImg(url){ return new Promise(r=>{const i=new Image();i.crossOrigin='';i.onload=()=>r(i);i.src=url;}); }

const clock=new THREE.Clock(); let started=false;
async function main(){
  const meta = await (await fetch('assets/scene.json')).json();
  W=meta.W; Hext=meta.Hext; CY=meta.CY; F=meta.F||1600;   // 実写フレームに更新
  camera.fov=2*Math.atan((Hext/2)/F)*180/Math.PI; camera.updateProjectionMatrix();
  // ---- FX パラメータ(エディタで操作/scene.jsonに保存) ----
  meta.fx=Object.assign({
    smokeAmount:0.55, smokeSpeed:0.012, smokeCount:8,          // 煙: 量 / 横流速(±) / 枚数
    smokeHeight:-0.55, smokeSpread:0.30,                       // 煙: 高さ(Y基準) / 高さのばらけ(手前↔奥)
    particleCount:2500, particleSize:0.013, particleHalo:0.6,  // 粒子: 量 / 細かさ(大きさ) / ハロー(発光)
    logoHalo:0.28,                                             // ロゴのハロー
    memberFeather:0.05, memberCutout:0.40, memberHalo:0.35,    // メンバー: ふちぼかし / 切り取り / ハロー(発光)
    shadowDarkness:0.34, shadowBlur:0.5, shadowLength:1.1,     // 落ち影: 濃さ / ぼかし / 長さ(カメラ側へ)
    vignette:0.34, grade:0.28, sideLight:0.30,                 // シネマ: ビネット / グレード(寒→暖) / サイド光
    bloomStrength:0.55, bloomRadius:0.7, bloomThreshold:0.75   // ブルーム(全体の発光滲み): 強さ / 半径 / しきい値
  }, meta.fx||{});
  const FX=meta.fx;
  // ソフト円形テクスチャ(粒子/ハロー用: 中心白→縁透明)
  const glcv=document.createElement('canvas'); glcv.width=glcv.height=64;
  { const gx=glcv.getContext('2d'); const g=gx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.4,'rgba(255,255,255,0.5)'); g.addColorStop(1,'rgba(255,255,255,0)');
    gx.fillStyle=g; gx.fillRect(0,0,64,64); }
  const glowTex=new THREE.CanvasTexture(glcv);
  // ---- depth mesh ----
  const dimg = await loadImg('assets/depth.png');
  const dcv=document.createElement('canvas'); dcv.width=dimg.width; dcv.height=dimg.height;
  const dctx=dcv.getContext('2d'); dctx.drawImage(dimg,0,0);
  const raw=dctx.getImageData(0,0,dimg.width,dimg.height).data; const dW=dimg.width,dH=dimg.height;
  // 深度をグレースケール化→ボックスブラーで階段(バンディング)を除去し床の波打ちを消す
  let df=new Float32Array(dW*dH); for(let i=0;i<dW*dH;i++) df[i]=raw[i*4]/255;
  const blur=(src,r)=>{const out=new Float32Array(dW*dH),tmp=new Float32Array(dW*dH);
    for(let y=0;y<dH;y++)for(let x=0;x<dW;x++){let s=0,n=0;for(let k=-r;k<=r;k++){const xx=x+k;if(xx>=0&&xx<dW){s+=src[y*dW+xx];n++;}}tmp[y*dW+x]=s/n;}
    for(let y=0;y<dH;y++)for(let x=0;x<dW;x++){let s=0,n=0;for(let k=-r;k<=r;k++){const yy=y+k;if(yy>=0&&yy<dH){s+=tmp[yy*dW+x];n++;}}out[y*dW+x]=s/n;}
    return out;};
  df=blur(df,3);
  // バイリニア抽出でグリッド解像度に依存した段差も消す
  const sample=(u,v)=>{const fx=u*(dW-1),fy=v*(dH-1);const x0=Math.min(dW-1,Math.floor(fx)),y0=Math.min(dH-1,Math.floor(fy));
    const x1=Math.min(dW-1,x0+1),y1=Math.min(dH-1,y0+1),tx=fx-x0,ty=fy-y0;
    const a=df[y0*dW+x0],b=df[y0*dW+x1],c=df[y1*dW+x0],d=df[y1*dW+x1];
    return (a*(1-tx)+b*tx)*(1-ty)+(c*(1-tx)+d*tx)*ty;};
  const GX=220,GY=200, OVER=0.06;
  const pos=[],uv=[],idx=[];
  for(let iy=0;iy<GY;iy++)for(let ix=0;ix<GX;ix++){
    const u=-OVER+(1+2*OVER)*ix/(GX-1), v=-OVER+(1+2*OVER)*iy/(GY-1);
    const uc=Math.min(1,Math.max(0,u)), vc=Math.min(1,Math.max(0,v));
    const px=u*(W-1), py=v*(Hext-1), Z=dZ(sample(uc,vc));
    pos.push((px-W/2)*Z/F, -(py-CY)*Z/F, -Z); uv.push(u,1-v);
  }
  for(let iy=0;iy<GY-1;iy++)for(let ix=0;ix<GX-1;ix++){const a=iy*GX+ix,b=a+1,c=a+GX+1,d=a+GX;idx.push(a,b,c,a,c,d);}
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2)); g.setIndex(idx);
  const bgTex=await load('assets/bg.jpg');
  const bgMesh=new THREE.Mesh(g, new THREE.MeshBasicMaterial({map:bgTex,side:THREE.DoubleSide}));
  bgMesh.renderOrder=-2; scene.add(bgMesh);

  // ---- 地を這う煙(ヘイズ): 足元に低く溜め横へ直線ドリフト。奥→手前に配置し前後の厚みを出す ----
  const smokeTex=await load('assets/smokeB.png');
  const smokeGroup=new THREE.Group(); scene.add(smokeGroup);
  let smokePlanes=[];
  function buildSmoke(n){
    smokePlanes.forEach(s=>{s.mesh.geometry.dispose();s.mat.dispose();smokeGroup.remove(s.mesh);});
    smokePlanes=[];
    n=Math.max(1,Math.round(n));
    for(let i=0;i<n;i++){
      const f=n>1?i/(n-1):0;                       // 0=手前, 1=奥
      const z=-(2.8+f*5.7);                         // 手前(-2.8)→奥(-8.5)
      const w=(-z)*1.5, h=w*0.42;
      const front=z>-6.0;                           // 手前=メンバーの前を薄く veil / 奥=後ろ
      // depthTest false=床メッシュに埋もれない(renderOrderで前後を制御)。高さは frame() で FX から反映
      const mat=new THREE.MeshBasicMaterial({map:smokeTex,transparent:true,opacity:0,depthWrite:false,depthTest:false,side:THREE.DoubleSide});
      const mesh=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
      const rnd=(Math.sin(i*12.9898)*43758.5453); const x0=((rnd-Math.floor(rnd))*2-1);
      mesh.position.set(x0*w*0.4, FX.smokeHeight, z); mesh.renderOrder=front?2:-1;
      smokeGroup.add(mesh);
      smokePlanes.push({mesh,mat,f,z,w,x:x0*w*0.4,drift:(Math.sin(i*7.13)*0.4+0.8),front});
    }
  }
  buildSmoke(FX.smokeCount);

  // ---- logo (深度テスト無効=背景に貫通されない / renderOrder=0でメンバーより先→メンバーが隠す) ----
  const L=meta.logo, lt=await load('assets/logo.png');
  const lmat=new THREE.MeshBasicMaterial({map:lt,transparent:true,opacity:0,side:THREE.FrontSide,depthTest:false,depthWrite:false});
  const logo=new THREE.Mesh(new THREE.PlaneGeometry(L.wl,L.wl*L.asp),lmat);
  logo.position.set(L.x,L.y,-L.z); logo.renderOrder=0; scene.add(logo);   // メンバーの後ろ(最前面にしない)
  // ロゴのハロー(後ろに広がる発光)
  const lhMat=new THREE.MeshBasicMaterial({map:glowTex,transparent:true,opacity:0,depthTest:false,depthWrite:false,blending:THREE.AdditiveBlending,color:0x9fd4ff});
  const logoHalo=new THREE.Mesh(new THREE.PlaneGeometry(1,1),lhMat); logoHalo.renderOrder=-0.5; scene.add(logoHalo);

  // ---- 接地シャドウ用ソフト楕円テクスチャ ----
  const scv=document.createElement('canvas'); scv.width=scv.height=128;
  { const sx=scv.getContext('2d');
    const gr=sx.createRadialGradient(64,64,2,64,64,62);
    gr.addColorStop(0,'rgba(0,0,0,0.62)'); gr.addColorStop(0.55,'rgba(0,0,0,0.32)'); gr.addColorStop(1,'rgba(0,0,0,0)');
    sx.fillStyle=gr; sx.fillRect(0,0,128,128); }
  const shTex=new THREE.CanvasTexture(scv);

  // ---- members (整合配置=Hで拡大背景に合わせた3D座標に直接配置) ----
  // ふちぼかし(feather)+切り取り(cutout)をシェーダで制御。halo=白リム発光
  const MEM_VERT='varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}';
  // ふち白トリム: edgeWhite=削る半径(px相当)。その半径内に透明があり かつ 白い画素をゴッソリ削る
  const MEM_FRAG='uniform sampler2D map;uniform float cutout,feather,opacity,edgeWhite;uniform vec2 texel;varying vec2 vUv;'
    +'float sa(vec2 d){return texture2D(map,vUv+d*texel).a;}'
    +'void main(){vec4 t=texture2D(map,vUv);float a=smoothstep(cutout-feather,cutout+feather,t.a);if(a<0.004)discard;'
    +'if(edgeWhite>0.001){float r1=edgeWhite*0.5,r2=edgeWhite,d=0.7071;float amin=1.0;'
    +'amin=min(amin,sa(vec2(r1,0.)));amin=min(amin,sa(vec2(-r1,0.)));amin=min(amin,sa(vec2(0.,r1)));amin=min(amin,sa(vec2(0.,-r1)));'
    +'amin=min(amin,sa(vec2(r1,r1)*d));amin=min(amin,sa(vec2(-r1,-r1)*d));amin=min(amin,sa(vec2(r1,-r1)*d));amin=min(amin,sa(vec2(-r1,r1)*d));'
    +'amin=min(amin,sa(vec2(r2,0.)));amin=min(amin,sa(vec2(-r2,0.)));amin=min(amin,sa(vec2(0.,r2)));amin=min(amin,sa(vec2(0.,-r2)));'
    +'amin=min(amin,sa(vec2(r2,r2)*d));amin=min(amin,sa(vec2(-r2,-r2)*d));amin=min(amin,sa(vec2(r2,-r2)*d));amin=min(amin,sa(vec2(-r2,r2)*d));'
    +'float edge=1.0-smoothstep(cutout-0.05,cutout+0.05,amin);'          // 半径内に透明=境界帯
    +'float wht=smoothstep(0.22,0.6,min(t.r,min(t.g,t.b)));'             // 白/明るい灰も対象(緩め)
    +'a*=1.0-edge*wht;}'                                                 // 帯内の明るい縁を全削り
    +'if(a<0.004)discard;gl_FragColor=vec4(t.rgb,a*opacity);}';
  // ハロー: 外側に太くにじむ白光→Bloomが拾って発光に見える
  const HALO_FRAG='uniform sampler2D map;uniform float cutout,feather,opacity;varying vec2 vUv;void main(){vec4 t=texture2D(map,vUv);float a=smoothstep(cutout-feather*6.0,cutout+feather*6.0,t.a);gl_FragColor=vec4(vec3(1.6,1.5,1.25),a*opacity);}';
  // 落ち影: 黒シルエットをブラー(複数サンプル)して床に落とす
  const SHADOW_FRAG='uniform sampler2D map;uniform float cutout,darkness,blur;varying vec2 vUv;void main(){float a=0.0;for(int j=-2;j<=2;j++){float o=float(j)*blur*0.02;a+=step(cutout,texture2D(map,vUv+vec2(o,0.0)).a);a+=step(cutout,texture2D(map,vUv+vec2(0.0,o)).a);}a/=10.0;gl_FragColor=vec4(0.0,0.0,0.0,a*darkness);}';
  const memObjs=[];
  const applyMember=o=>{
    const m=o.m, footY=m.Yc-m.Hc/2+(m.dy||0)+(m.padFrac||0)*m.Hc;  // 実際の靴接地ライン
    o.footY=footY;
    o.mesh.geometry.dispose(); o.mesh.geometry=new THREE.PlaneGeometry(m.Wc,m.Hc);
    o.mesh.position.set(m.Xc, m.Yc+(m.dy||0), -m.Zm);
    o.halo.geometry.dispose(); o.halo.geometry=new THREE.PlaneGeometry(m.Wc*1.1,m.Hc*1.1);
    o.halo.position.copy(o.mesh.position);
    o.shp.geometry.dispose(); o.shp.geometry=new THREE.PlaneGeometry(m.Wc, m.Hc);   // 落ち影(足元→カメラ側へ寝かせる)
    o.sh.geometry.dispose(); o.sh.geometry=new THREE.PlaneGeometry(m.Wc*0.95, m.Wc*1.05);
    o.sh.position.set(m.Xc, footY+0.015, -m.Zm+m.Wc*0.42);
  };
  for(const m of meta.members){
    const t=await load(m.file);
    // 接地シャドウ(床に寝かせ手前に伸ばす=足手前の視差ギャップ帯を埋め浮きを消す)
    const smat=new THREE.MeshBasicMaterial({map:shTex,transparent:true,opacity:0.6,depthTest:true,depthWrite:false,side:THREE.DoubleSide});
    const sh=new THREE.Mesh(new THREE.PlaneGeometry(1,1), smat); sh.rotation.x=-Math.PI/2; sh.renderOrder=0.5; scene.add(sh);
    // 擬似落ち影(シルエットを床に寝かせカメラ側へ伸ばす)
    const spmat=new THREE.ShaderMaterial({uniforms:{map:{value:t},cutout:{value:FX.memberCutout},darkness:{value:FX.shadowDarkness},blur:{value:FX.shadowBlur}},vertexShader:MEM_VERT,fragmentShader:SHADOW_FRAG,transparent:true,depthWrite:false,depthTest:false,side:THREE.DoubleSide});
    const shp=new THREE.Mesh(new THREE.PlaneGeometry(1,1),spmat); shp.rotation.x=Math.PI/2; shp.renderOrder=0.3; scene.add(shp);
    // リムハロー(メンバーの外側ににじむ光→本体が上に描かれ縁だけ発光)
    const hmat=new THREE.ShaderMaterial({uniforms:{map:{value:t},cutout:{value:FX.memberCutout},feather:{value:FX.memberFeather},opacity:{value:FX.memberHalo}},vertexShader:MEM_VERT,fragmentShader:HALO_FRAG,transparent:true,depthWrite:false,depthTest:true,blending:THREE.AdditiveBlending});
    const halo=new THREE.Mesh(new THREE.PlaneGeometry(1,1),hmat); halo.renderOrder=0.9; scene.add(halo);
    const tw=(t.image&&t.image.width)||1024, th=(t.image&&t.image.height)||1024;
    const mat=new THREE.ShaderMaterial({uniforms:{map:{value:t},cutout:{value:FX.memberCutout},feather:{value:FX.memberFeather},opacity:{value:1},edgeWhite:{value:m.edgeWhite||0},texel:{value:new THREE.Vector2(1/tw,1/th)}},vertexShader:MEM_VERT,fragmentShader:MEM_FRAG,transparent:true,depthWrite:false,depthTest:true});
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(1,1),mat); mesh.renderOrder=1; scene.add(mesh);
    const o={m,mesh,sh,halo,mat,hmat,shp,spmat}; memObjs.push(o); applyMember(o);
  }

  // ---- dust (粒子: 量/細かさ/ハローをFXで制御・奥から手前まで3D配置) ----
  let dust,dg2,dp,dph,dbase,N;
  function buildDust(count){
    if(dust){dg2.dispose();dust.material.dispose();scene.remove(dust);}
    N=Math.max(1,Math.round(count)); dp=new Float32Array(N*3); dph=new Float32Array(N);
    for(let i=0;i<N;i++){const z=-(2.0+Math.random()*6.8);dp[i*3]=(Math.random()*2-1)*(-z)*0.6;dp[i*3+1]=-2+Math.random()*4.4;dp[i*3+2]=z;dph[i]=Math.random()*6.28;}
    dg2=new THREE.BufferGeometry(); dg2.setAttribute('position',new THREE.BufferAttribute(dp,3));
    const dmat=new THREE.PointsMaterial({map:glowTex,color:0xfff4e0,size:FX.particleSize,sizeAttenuation:true,transparent:true,opacity:FX.particleHalo,blending:THREE.AdditiveBlending,depthWrite:false});
    dust=new THREE.Points(dg2,dmat); scene.add(dust); dbase=dp.slice();
  }
  buildDust(FX.particleCount);

  // ---- bloom ----
  const composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  const afterimage=new AfterimagePass(0.7); composer.addPass(afterimage);   // モーションブラー(動く時だけ)
  const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),FX.bloomStrength,FX.bloomRadius,FX.bloomThreshold);
  composer.addPass(bloom);
  // ---- シネマ仕上げ(ビネット + グレード寒→暖 + サイド光) 一括ポストパス ----
  const gradePass=new ShaderPass({uniforms:{tDiffuse:{value:null},vignette:{value:FX.vignette},grade:{value:FX.grade},sideLight:{value:FX.sideLight}},
    vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'uniform sampler2D tDiffuse;uniform float vignette,grade,sideLight;varying vec2 vUv;'
      +'void main(){vec4 c=texture2D(tDiffuse,vUv);vec3 col=c.rgb;'
      +'float lum=dot(col,vec3(0.299,0.587,0.114));'
      +'vec3 warm=vec3(1.07,1.01,0.90),cool=vec3(0.93,0.99,1.12);'
      +'vec3 g=col*mix(cool,warm,lum); col=mix(col,g,grade);'          // 暗部寒色/明部暖色
      +'float sl=smoothstep(1.0,0.0,vUv.x); col+=sl*sideLight*0.28*lum;'  // 左からのサイド光
      +'vec2 d=vUv-0.5; float v=1.0-dot(d,d)*vignette*2.4; col*=clamp(v,0.0,1.0);'  // ビネット
      +'gl_FragColor=vec4(col,c.a);}'});
  composer.addPass(gradePass);

  applyShift();
  document.getElementById('load').style.opacity=0;
  const enterEl=document.getElementById('enter');
  const DBG=new URLSearchParams(location.search).get('t')!=null||new URLSearchParams(location.search).has('edit');
  const AUTO=new URLSearchParams(location.search).has('auto');   // 埋め込み用: enter待ちせず自動再生
  if(DBG){document.getElementById('load').style.display='none';started=true;}
  if(AUTO){document.getElementById('load').style.display='none';started=true;clock.start();
    // iOSジャイロは初回タップで許可要求(任意)
    addEventListener('pointerdown',async()=>{ if(typeof DeviceOrientationEvent!=='undefined'&&DeviceOrientationEvent.requestPermission){try{await DeviceOrientationEvent.requestPermission();}catch(e){}} },{once:true});
  }
  setTimeout(()=>{document.getElementById('load').style.display='none';if(!DBG&&!AUTO)enterEl.style.display='flex';},900);
  enterEl.addEventListener('pointerdown',async()=>{
    if(typeof DeviceOrientationEvent!=='undefined'&&DeviceOrientationEvent.requestPermission){
      try{await DeviceOrientationEvent.requestPermission();}catch(e){}
    }

  // アスペクト別設定の選択。編集中はmeta生値(スライダー直結)、公開時はviewsをアスペクトで線形補間
  //  → タップした比率ちょうどではその値と完全一致(WYSIWYG)、中間は滑らかに繋ぐ(カクつき/飛び無し)
  const baseCF=()=>({fit:(meta.fit!=null?meta.fit:0.86),camY:(meta.camY!=null?meta.camY:0.15),logoScale:(meta.logoScale||1),logoYoff:(meta.logoYoff||0),logoX:(meta.logoX||0)});
  const _pick=(v,b)=>({fit:v.fit??b.fit,camY:v.camY??b.camY,logoScale:v.logoScale??b.logoScale,logoYoff:v.logoYoff??b.logoYoff,logoX:v.logoX??b.logoX});
  const _lerp=(a,c,t)=>({fit:a.fit+(c.fit-a.fit)*t,camY:a.camY+(c.camY-a.camY)*t,logoScale:a.logoScale+(c.logoScale-a.logoScale)*t,logoYoff:a.logoYoff+(c.logoYoff-a.logoYoff)*t,logoX:a.logoX+(c.logoX-a.logoX)*t});
  function pickView(asp){
    const b=baseCF();
    if(EDIT) return b;
    const vs=(meta.views||[]).filter(v=>v.aspect!=null).sort((x,y)=>x.aspect-y.aspect).map(v=>({aspect:v.aspect,..._pick(v,b)}));
    if(!vs.length) return b;
    if(asp<=vs[0].aspect) return vs[0];
    if(asp>=vs[vs.length-1].aspect) return vs[vs.length-1];
    for(let i=0;i<vs.length-1;i++){ if(asp>=vs[i].aspect && asp<=vs[i+1].aspect){ const t=(asp-vs[i].aspect)/(vs[i+1].aspect-vs[i].aspect); return _lerp(vs[i],vs[i+1],t); } }
    return vs[0];
  }
  // カメラのキーフレーム補間(共有パス)。x,y=ヒーロー中心基準オフセット / z=グループ面(-gcz)基準 / hero=自動フィット追従(0..1) / rx,ry=回転
  const _lp=(a,b,u)=>a+(b-a)*u;
  function sampleCamPath(kf,t){
    if(!kf||!kf.length) return {x:0,y:0,z:0,hero:1,rx:0,ry:0};
    if(t<=kf[0].t) return kf[0];
    if(t>=kf[kf.length-1].t) return kf[kf.length-1];
    for(let i=0;i<kf.length-1;i++){ if(t>=kf[i].t&&t<=kf[i+1].t){ const u=sstep((t-kf[i].t)/(kf[i+1].t-kf[i].t||1)),a=kf[i],b=kf[i+1];
      return {x:_lp(a.x,b.x,u),y:_lp(a.y,b.y,u),z:_lp(a.z,b.z,u),hero:_lp(a.hero==null?1:a.hero,b.hero==null?1:b.hero,u),rx:_lp(a.rx||0,b.rx||0,u),ry:_lp(a.ry||0,b.ry||0,u)}; } }
    return kf[0];
  }
  // 現本編の動き(背後→smootherstepでヒーロー→微速寄り+突入時スイング)を正確に再現したデフォルト
  const defaultCamPath=()=>[
    {t:0,x:0,   y:0,z:-0.400,hero:0.000,rx:0,ry:0},
    {t:1,x:0.45,y:0,z:-0.359,hero:0.104,rx:0,ry:0},
    {t:2,x:0,   y:0,z:-0.200,hero:0.500,rx:0,ry:0},
    {t:3,x:-0.05,y:0,z:-0.041,hero:0.896,rx:0,ry:0},
    {t:4,x:0,   y:0,z:0.000, hero:1.000,rx:0,ry:0},
    {t:6,x:0,   y:0,z:-0.083,hero:1.000,rx:0,ry:0},   // 微速寄り(eout)をサンプル
    {t:8,x:0,   y:0,z:-0.145,hero:1.000,rx:0,ry:0},
    {t:12,x:0,  y:0,z:-0.219,hero:1.000,rx:0,ry:0},
    {t:CFG.dur,x:0,y:0,z:-0.250,hero:1.000,rx:0,ry:0}];
  function frame(){
    const raw = FREEZE!=null?parseFloat(FREEZE):(started?clock.getElapsedTime():0);
    if(EDIT&&camEdit.on&&camEdit.playing){ camEdit.t+=1/60; if(camEdit.t>CFG.dur)camEdit.t=0; if((_fc=(_fc+1)%6)===0&&window.__editDraw)window.__editDraw(); }
    const el=EDIT?(camEdit.on?camEdit.t:CFG.dur):(raw%CFG.dur), t2=el;
    // camera reveal (ヒーロー位置=アスペクトで自動フィット: 縦画面ほど引いて全員入れる)
    // グループを必ず余白付きで収めるフィットカメラ(どのアスペクトでも見切れ無し)
    const asp=VW/VH;
    const vt=Math.tan(camera.fov*Math.PI/360);
    const G=meta.group;
    // アスペクト別設定(編集中は生値/公開時は最も近いviewを採用)
    const CF=pickView(asp);
    const Dw=(G.halfW*CF.fit)/(vt*Math.max(0.34,asp)), Dh=(G.halfH*CF.fit)/vt;
    const D=Math.max(Dw,Dh,0.6);
    const hz=-G.gcz+D;                       // ヒーロー位置(寄せて迫力)
    const start=-(G.gcz+0.4);                 // メンバーの背後(片面カリングで無人)
    ptx+=(tx-ptx)*0.06; pty+=(ty-pty)*0.06;
    const heroY0=G.gcy+CF.camY;
    const usePath=(EDIT&&camEdit.on&&meta.camPath)||(!EDIT&&meta.camPath&&meta.camPath.length>=2);
    let camZ;
    if(usePath){
      const P=sampleCamPath(meta.camPath,t2);
      camZ=-G.gcz+P.z+(P.hero==null?1:P.hero)*D;   // z=グループ面基準 + hero*D で終点は各画面フィット
      camera.position.set(G.gcx+P.x+ptx*0.3, heroY0+P.y-pty*0.2, camZ);
      camera.rotation.set(P.rx||0, P.ry||0, 0);
    } else {
      if(t2<=CFG.revEnd) camZ=start+(hz-start)*sstep(t2/CFG.revEnd); else camZ=hz-0.25*eout((t2-CFG.revEnd)/(CFG.dur-CFG.revEnd));
      const rp=Math.min(1,t2/CFG.revEnd), wa=(1-rp)*(1-rp);
      const wx=Math.sin(rp*Math.PI*2.0)*0.8*wa;   // 突き抜け中だけ横スイング
      camera.position.set(G.gcx+wx+ptx*0.3, heroY0-pty*0.2, camZ);
      camera.rotation.set(0,0,0);              // 真っ直ぐ(lookAt無し)
    }
    applyShift();
    const la=Math.min(1,Math.max(0,(t2-7.0)/0.6));   // logo appear @7s
    // ロゴをフレーム内上部へ自動配置+contain(幅と高さ両方に収める=全アスペクトで適正)
    { const Zl=L.z, dl=camZ+Zl, vH=vt*dl, vW=vt*Math.max(0.34,asp)*dl;
      const lw=Math.min(vW*0.82, vH*0.62/L.asp)*CF.logoScale, lsc=lw/L.wl; logo.scale.set(lsc,lsc,1);
      const lH=L.wl*L.asp*lsc;
      logo.position.set(G.gcx+CF.logoX*vW, (G.gcy+CF.camY)+vH-lH/2-vH*0.05+CF.logoYoff*vH, -Zl);
      // ロゴのハロー(ロゴ位置に追従・後ろに広がる)
      logoHalo.position.set(logo.position.x, logo.position.y, logo.position.z-0.01);
      logoHalo.scale.set(L.wl*lsc*1.6, L.wl*L.asp*lsc*2.0, 1); lhMat.opacity=FX.logoHalo*la; }
    afterimage.uniforms['damp'].value = t2<CFG.revEnd ? 0.5 : 0.18;
    lmat.opacity=la;
    // ---- FX ライブ反映 ----
    for(const s of smokePlanes){                        // 煙: 横直線ドリフト + 端フェード(継ぎ目なし) + 高さ
      const R=s.w*0.6; s.x+=FX.smokeSpeed*s.drift;
      if(s.x>R)s.x-=2*R; else if(s.x<-R)s.x+=2*R;
      s.mesh.position.x=s.x;
      s.mesh.position.y=FX.smokeHeight+(0.5-s.f)*FX.smokeSpread;   // 手前↔奥の高低差
      const e=Math.min(1,Math.max(0,(Math.abs(s.x)-R*0.55)/(R*0.45)));
      s.mat.opacity=FX.smokeAmount*(1-e*e)*(s.front?0.5:1.0);
    }
    const sl=FX.shadowLength;
    for(const o of memObjs){                             // メンバー: ふちぼかし/切り取り/ハロー
      o.mat.uniforms.cutout.value=FX.memberCutout; o.mat.uniforms.feather.value=FX.memberFeather; o.mat.uniforms.edgeWhite.value=o.m.edgeWhite||0;
      o.hmat.uniforms.cutout.value=FX.memberCutout; o.hmat.uniforms.feather.value=FX.memberFeather; o.hmat.uniforms.opacity.value=FX.memberHalo;
      o.spmat.uniforms.cutout.value=FX.memberCutout; o.spmat.uniforms.darkness.value=FX.shadowDarkness; o.spmat.uniforms.blur.value=FX.shadowBlur;
      o.shp.scale.set(1,sl,1); o.shp.position.set(o.m.Xc, o.footY, -o.m.Zm+o.m.Hc*sl/2);   // 足元→カメラ側へ伸ばす
    }
    dust.material.size=FX.particleSize; dust.material.opacity=FX.particleHalo;   // 粒子: 細かさ/ハロー
    gradePass.uniforms.vignette.value=FX.vignette; gradePass.uniforms.grade.value=FX.grade; gradePass.uniforms.sideLight.value=FX.sideLight;  // シネマ
    bloom.strength=FX.bloomStrength; bloom.radius=FX.bloomRadius; bloom.threshold=FX.bloomThreshold;   // ブルーム(全体発光)
    // dust drift
    const tt=clock.getElapsedTime();
    for(let i=0;i<N;i++){dp[i*3]=dbase[i*3]+Math.sin(dph[i]+tt*0.5)*0.06;dp[i*3+1]=dbase[i*3+1]+Math.cos(dph[i]*1.3+tt*0.4)*0.05;}
    dg2.attributes.position.needsUpdate=true;
    composer.render();
    requestAnimationFrame(frame);
  }
  function applyViewport(){
    if(forceAspect){ let w=innerWidth,h=Math.round(w/forceAspect); if(h>innerHeight){h=innerHeight;w=Math.round(h*forceAspect);} VW=w;VH=h; }
    else { VW=innerWidth; VH=innerHeight; }
    renderer.setSize(VW,VH,false);
    const cs=renderer.domElement.style; cs.width=VW+'px'; cs.height=VH+'px'; cs.position='fixed';
    cs.left=Math.round((innerWidth-VW)/2)+'px'; cs.top=Math.round((innerHeight-VH)/2)+'px';
    camera.aspect=VW/VH; applyShift(); composer.setSize(VW,VH);
  }
  window.__applyViewport=applyViewport; applyViewport();
  frame();
  addEventListener('resize',applyViewport);
  window.__ready=true;
}
main();
</script>
