<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HARIBOW — Go Beyond</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:-apple-system,sans-serif}
  #c{display:block;width:100vw;height:100vh}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#889;letter-spacing:.3em;font-size:12px;background:#000;transition:opacity .8s;z-index:5}
  #hint{position:fixed;left:0;right:0;bottom:24px;text-align:center;color:#cbd6ff;font-size:11px;letter-spacing:.25em;opacity:0;transition:opacity 1s;z-index:4;pointer-events:none}
  #enter{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(0,0,0,.55);z-index:6;cursor:pointer;transition:opacity .7s}
  #enter .et{color:#fff;font-size:13px;letter-spacing:.6em;font-weight:600}
  #enter .eb{color:#cbd6ff;font-size:11px;letter-spacing:.35em;border:1px solid #4a5570;padding:12px 26px;border-radius:40px}
</style>
</head>
<body>
<div id="load">L O A D I N G</div>
<div id="enter"><div class="et">HARIBOW</div><div class="eb">TAP TO ENTER</div></div>
<div id="hint">スマホを傾けて / TILT &amp; TOUCH</div>
<canvas id="c"></canvas>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
const errShow=m=>{const l=document.getElementById('load');if(l){l.textContent='ERR: '+m;l.style.opacity=1;l.style.display='flex';}};
window.onerror=(m,s,ln)=>errShow(m+' @'+ln);
addEventListener('unhandledrejection',e=>errShow('REJ '+(e.reason&&e.reason.message||e.reason)));

const CFG = { shiftY: 0.0, bloom:0.55, dust:1500, dur:20.0, revEnd:3.0 };
let F=1600, W=1600, Hext=1589, CY=794;   // 実写背景(scene.jsonから上書き)
const dZ = dn => 2.0 + (1.0-dn)*7.0;

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x000000);
const camera = new THREE.PerspectiveCamera(59.66, innerWidth/innerHeight, 0.05, 60);  // 拡張フレーム全体=引き
camera.position.set(0,0,-8.5);
function applyShift(){ camera.updateProjectionMatrix(); camera.projectionMatrix.elements[9]=CFG.shiftY; }

const loader = new THREE.TextureLoader();
const load = url => new Promise(res=>loader.load(url,t=>{t.colorSpace=THREE.SRGBColorSpace;res(t);}));
function loadImg(url){ return new Promise(r=>{const i=new Image();i.crossOrigin='';i.onload=()=>r(i);i.src=url;}); }

const clock=new THREE.Clock(); let started=false;
async function main(){
  const meta = await (await fetch('assets/scene.json')).json();
  W=meta.W; Hext=meta.Hext; CY=meta.CY; F=meta.F||1600;   // 実写フレームに更新
  camera.fov=2*Math.atan((Hext/2)/F)*180/Math.PI; camera.updateProjectionMatrix();
  // ---- depth mesh ----
  const dimg = await loadImg('assets/depth.png');
  const dcv=document.createElement('canvas'); dcv.width=dimg.width; dcv.height=dimg.height;
  const dctx=dcv.getContext('2d'); dctx.drawImage(dimg,0,0);
  const dd=dctx.getImageData(0,0,dimg.width,dimg.height).data; const dW=dimg.width,dH=dimg.height;
  const sample=(u,v)=>{const x=Math.min(dW-1,Math.floor(u*(dW-1))),y=Math.min(dH-1,Math.floor(v*(dH-1)));return dd[(y*dW+x)*4]/255;};
  const GX=220,GY=200, OVER=0.06;
  const pos=[],uv=[],idx=[];
  for(let iy=0;iy<GY;iy++)for(let ix=0;ix<GX;ix++){
    const u=-OVER+(1+2*OVER)*ix/(GX-1), v=-OVER+(1+2*OVER)*iy/(GY-1);
    const uc=Math.min(1,Math.max(0,u)), vc=Math.min(1,Math.max(0,v));
    const px=u*(W-1), py=v*(Hext-1), Z=dZ(sample(uc,vc));
    pos.push((px-W/2)*Z/F, -(py-CY)*Z/F, -Z); uv.push(u,1-v);
  }
  for(let iy=0;iy<GY-1;iy++)for(let ix=0;ix<GX-1;ix++){const a=iy*GX+ix,b=a+1,c=a+GX+1,d=a+GX;idx.push(a,b,c,a,c,d);}
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2)); g.setIndex(idx);
  const bgTex=await load('assets/bg.jpg');
  const bgMesh=new THREE.Mesh(g, new THREE.MeshBasicMaterial({map:bgTex,side:THREE.DoubleSide}));
  bgMesh.renderOrder=-2; scene.add(bgMesh);

  // (旧・偽装床は削除。実写背景メッシュが本物の床を持つ)

  // ---- logo (深度テスト無効=背景に貫通されない / renderOrder=0でメンバーより先→メンバーが隠す) ----
  const L=meta.logo, lt=await load('assets/logo.png');
  const lmat=new THREE.MeshBasicMaterial({map:lt,transparent:true,opacity:0,side:THREE.FrontSide,depthTest:false,depthWrite:false});
  const logo=new THREE.Mesh(new THREE.PlaneGeometry(L.wl,L.wl*L.asp),lmat);
  logo.position.set(L.x,L.y,-L.z); logo.renderOrder=0; scene.add(logo);

  // ---- members (整合配置=Hで拡大背景に合わせた3D座標に直接配置) ----
  for(const m of meta.members){
    const t=await load(m.file);
    const mat=new THREE.MeshBasicMaterial({map:t,transparent:true,alphaTest:0.35,side:THREE.FrontSide,depthWrite:true});
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(m.Wc, m.Hc),mat);
    mesh.position.set(m.Xc, m.Yc, -m.Zm);
    mesh.renderOrder=1; scene.add(mesh);
  }

  // ---- dust ----
  const N=CFG.dust, dp=new Float32Array(N*3), dph=new Float32Array(N);
  for(let i=0;i<N;i++){const z=-(2.2+Math.random()*6.4);dp[i*3]=(Math.random()*2-1)*(-z)*0.55;dp[i*3+1]=-2+Math.random()*4.2;dp[i*3+2]=z;dph[i]=Math.random()*6.28;}
  const dg2=new THREE.BufferGeometry(); dg2.setAttribute('position',new THREE.BufferAttribute(dp,3));
  const dmat=new THREE.PointsMaterial({color:0xfff4e0,size:0.011,sizeAttenuation:true,transparent:true,opacity:0.55,blending:THREE.AdditiveBlending,depthWrite:false});
  const dust=new THREE.Points(dg2,dmat); scene.add(dust);
  const dbase=dp.slice();

  // ---- bloom ----
  const composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),CFG.bloom,0.7,0.75);
  composer.addPass(bloom);

  applyShift();
  document.getElementById('load').style.opacity=0;
  const enterEl=document.getElementById('enter');
  const DBG=new URLSearchParams(location.search).get('t')!=null;
  if(DBG){document.getElementById('load').style.display='none';started=true;}
  setTimeout(()=>{document.getElementById('load').style.display='none';if(!DBG)enterEl.style.display='flex';},900);
  enterEl.addEventListener('pointerdown',async()=>{
    if(typeof DeviceOrientationEvent!=='undefined'&&DeviceOrientationEvent.requestPermission){
      try{await DeviceOrientationEvent.requestPermission();}catch(e){}
    }
    enterEl.style.opacity=0; setTimeout(()=>enterEl.style.display='none',700);
    document.getElementById('hint').style.opacity=1; setTimeout(()=>{document.getElementById('hint').style.opacity=0;},6000);
    started=true; clock.start();
  },{once:true});

  // ---- interaction (gyro/touch parallax) ----
  let tx=0,ty=0,ptx=0,pty=0;
  addEventListener('deviceorientation',e=>{if(e.gamma!=null){tx=Math.max(-1,Math.min(1,e.gamma/30));ty=Math.max(-1,Math.min(1,(e.beta-40)/30));}});
  addEventListener('pointermove',e=>{tx=(e.clientX/innerWidth*2-1);ty=(e.clientY/innerHeight*2-1);});

  const eout=x=>{x=Math.min(1,Math.max(0,x));return 1-(1-x)**3;};
  const FREEZE=new URLSearchParams(location.search).get('t');   // ?t=秒 で固定(検証用)
  function frame(){
    const raw = FREEZE!=null?parseFloat(FREEZE):(started?clock.getElapsedTime():0);
    const el=raw%CFG.dur, t2=el;
    // camera reveal (ヒーロー位置=アスペクトで自動フィット: 縦画面ほど引いて全員入れる)
    // グループを必ず余白付きで収めるフィットカメラ(どのアスペクトでも見切れ無し)
    const asp=innerWidth/innerHeight;
    const vt=Math.tan(camera.fov*Math.PI/360);
    const G=meta.group;
    const Dw=(G.halfW*1.18)/(vt*Math.max(0.34,asp)), Dh=(G.halfH*1.18)/vt;   // グループ実寸をfit
    const D=Math.max(Dw,Dh,1.5);
    const hz=-G.gcz+D;                       // ヒーロー位置(グループ前D)
    const deep=-G.gcz-1.6;                    // 無人スタート(グループの奥)
    let z; if(t2<=CFG.revEnd) z=deep+(hz-deep)*eout(t2/CFG.revEnd); else z=hz-0.35*eout((t2-CFG.revEnd)/(CFG.dur-CFG.revEnd));
    ptx+=(tx-ptx)*0.06; pty+=(ty-pty)*0.06;
    camera.position.set(G.gcx+ptx*0.3, G.gcy-pty*0.2, z); applyShift();   // グループ中心に照準
    // logo appear @7s
    const la=Math.min(1,Math.max(0,(t2-7.0)/0.6)); lmat.opacity=la;
    // dust drift
    const tt=clock.getElapsedTime();
    for(let i=0;i<N;i++){dp[i*3]=dbase[i*3]+Math.sin(dph[i]+tt*0.5)*0.06;dp[i*3+1]=dbase[i*3+1]+Math.cos(dph[i]*1.3+tt*0.4)*0.05;}
    dg2.attributes.position.needsUpdate=true;
    composer.render();
    requestAnimationFrame(frame);
  }
  frame();
  addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;applyShift();composer.setSize(innerWidth,innerHeight);});
  window.__ready=true;
}
main();
</script>
</body>
</html>
