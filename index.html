<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HARIBOW — Go Beyond</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:-apple-system,sans-serif}
  #c{display:block;width:100vw;height:100vh}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#889;letter-spacing:.3em;font-size:12px;background:#000;transition:opacity .8s;z-index:5}
  #hint{position:fixed;left:0;right:0;bottom:24px;text-align:center;color:#cbd6ff;font-size:11px;letter-spacing:.25em;opacity:0;transition:opacity 1s;z-index:4;pointer-events:none}
  #enter{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(0,0,0,.55);z-index:6;cursor:pointer;transition:opacity .7s}
  #enter .et{color:#fff;font-size:13px;letter-spacing:.6em;font-weight:600}
  #enter .eb{color:#cbd6ff;font-size:11px;letter-spacing:.35em;border:1px solid #4a5570;padding:12px 26px;border-radius:40px}
</style>
</head>
<body>
<div id="load">L O A D I N G</div>
<div id="enter"><div class="et">HARIBOW</div><div class="eb">TAP TO ENTER</div></div>
<div id="hint">スマホを傾けて / TILT &amp; TOUCH</div>
<canvas id="c"></canvas>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';
const errShow=m=>{const l=document.getElementById('load');if(l){l.textContent='ERR: '+m;l.style.opacity=1;l.style.display='flex';}};
window.onerror=(m,s,ln)=>errShow(m+' @'+ln);
addEventListener('unhandledrejection',e=>errShow('REJ '+(e.reason&&e.reason.message||e.reason)));

const CFG = { shiftY: 0.0, bloom:0.55, dust:1500, dur:20.0, revEnd:4.0 };
let F=1600, W=1600, Hext=1589, CY=794;   // 実写背景(scene.jsonから上書き)
let VW=innerWidth, VH=innerHeight, forceAspect=null;   // レンダ実寸(編集モードのアスペクト固定用)
const dZ = dn => 2.0 + (1.0-dn)*7.0;

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x000000);
const camera = new THREE.PerspectiveCamera(59.66, innerWidth/innerHeight, 0.05, 60);  // 拡張フレーム全体=引き
camera.position.set(0,0,-8.5);
function applyShift(){ camera.updateProjectionMatrix(); camera.projectionMatrix.elements[9]=CFG.shiftY; }

const loader = new THREE.TextureLoader();
const load = url => new Promise(res=>loader.load(url,t=>{t.colorSpace=THREE.SRGBColorSpace;res(t);}));
function loadImg(url){ return new Promise(r=>{const i=new Image();i.crossOrigin='';i.onload=()=>r(i);i.src=url;}); }

const clock=new THREE.Clock(); let started=false;
async function main(){
  const meta = await (await fetch('assets/scene.json')).json();
  W=meta.W; Hext=meta.Hext; CY=meta.CY; F=meta.F||1600;   // 実写フレームに更新
  camera.fov=2*Math.atan((Hext/2)/F)*180/Math.PI; camera.updateProjectionMatrix();
  // ---- depth mesh ----
  const dimg = await loadImg('assets/depth.png');
  const dcv=document.createElement('canvas'); dcv.width=dimg.width; dcv.height=dimg.height;
  const dctx=dcv.getContext('2d'); dctx.drawImage(dimg,0,0);
  const raw=dctx.getImageData(0,0,dimg.width,dimg.height).data; const dW=dimg.width,dH=dimg.height;
  // 深度をグレースケール化→ボックスブラーで階段(バンディング)を除去し床の波打ちを消す
  let df=new Float32Array(dW*dH); for(let i=0;i<dW*dH;i++) df[i]=raw[i*4]/255;
  const blur=(src,r)=>{const out=new Float32Array(dW*dH),tmp=new Float32Array(dW*dH);
    for(let y=0;y<dH;y++)for(let x=0;x<dW;x++){let s=0,n=0;for(let k=-r;k<=r;k++){const xx=x+k;if(xx>=0&&xx<dW){s+=src[y*dW+xx];n++;}}tmp[y*dW+x]=s/n;}
    for(let y=0;y<dH;y++)for(let x=0;x<dW;x++){let s=0,n=0;for(let k=-r;k<=r;k++){const yy=y+k;if(yy>=0&&yy<dH){s+=tmp[yy*dW+x];n++;}}out[y*dW+x]=s/n;}
    return out;};
  df=blur(df,3);
  // バイリニア抽出でグリッド解像度に依存した段差も消す
  const sample=(u,v)=>{const fx=u*(dW-1),fy=v*(dH-1);const x0=Math.min(dW-1,Math.floor(fx)),y0=Math.min(dH-1,Math.floor(fy));
    const x1=Math.min(dW-1,x0+1),y1=Math.min(dH-1,y0+1),tx=fx-x0,ty=fy-y0;
    const a=df[y0*dW+x0],b=df[y0*dW+x1],c=df[y1*dW+x0],d=df[y1*dW+x1];
    return (a*(1-tx)+b*tx)*(1-ty)+(c*(1-tx)+d*tx)*ty;};
  const GX=220,GY=200, OVER=0.06;
  const pos=[],uv=[],idx=[];
  for(let iy=0;iy<GY;iy++)for(let ix=0;ix<GX;ix++){
    const u=-OVER+(1+2*OVER)*ix/(GX-1), v=-OVER+(1+2*OVER)*iy/(GY-1);
    const uc=Math.min(1,Math.max(0,u)), vc=Math.min(1,Math.max(0,v));
    const px=u*(W-1), py=v*(Hext-1), Z=dZ(sample(uc,vc));
    pos.push((px-W/2)*Z/F, -(py-CY)*Z/F, -Z); uv.push(u,1-v);
  }
  for(let iy=0;iy<GY-1;iy++)for(let ix=0;ix<GX-1;ix++){const a=iy*GX+ix,b=a+1,c=a+GX+1,d=a+GX;idx.push(a,b,c,a,c,d);}
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2)); g.setIndex(idx);
  const bgTex=await load('assets/bg.jpg');
  const bgMesh=new THREE.Mesh(g, new THREE.MeshBasicMaterial({map:bgTex,side:THREE.DoubleSide}));
  bgMesh.renderOrder=-2; scene.add(bgMesh);

  // (旧・偽装床は削除。実写背景メッシュが本物の床を持つ)

  // ---- logo (深度テスト無効=背景に貫通されない / renderOrder=0でメンバーより先→メンバーが隠す) ----
  const L=meta.logo, lt=await load('assets/logo.png');
  const lmat=new THREE.MeshBasicMaterial({map:lt,transparent:true,opacity:0,side:THREE.FrontSide,depthTest:false,depthWrite:false});
  const logo=new THREE.Mesh(new THREE.PlaneGeometry(L.wl,L.wl*L.asp),lmat);
  logo.position.set(L.x,L.y,-L.z); logo.renderOrder=0; scene.add(logo);

  // ---- 接地シャドウ用ソフト楕円テクスチャ ----
  const scv=document.createElement('canvas'); scv.width=scv.height=128;
  { const sx=scv.getContext('2d');
    const gr=sx.createRadialGradient(64,64,2,64,64,62);
    gr.addColorStop(0,'rgba(0,0,0,0.62)'); gr.addColorStop(0.55,'rgba(0,0,0,0.32)'); gr.addColorStop(1,'rgba(0,0,0,0)');
    sx.fillStyle=gr; sx.fillRect(0,0,128,128); }
  const shTex=new THREE.CanvasTexture(scv);

  // ---- members (整合配置=Hで拡大背景に合わせた3D座標に直接配置) ----
  const memObjs=[];
  const applyMember=o=>{
    const m=o.m, footY=m.Yc-m.Hc/2+(m.dy||0)+(m.padFrac||0)*m.Hc;  // 実際の靴接地ライン
    o.mesh.geometry.dispose(); o.mesh.geometry=new THREE.PlaneGeometry(m.Wc,m.Hc);
    o.mesh.position.set(m.Xc, m.Yc+(m.dy||0), -m.Zm);
    o.sh.geometry.dispose(); o.sh.geometry=new THREE.PlaneGeometry(m.Wc*0.95, m.Wc*1.05);
    o.sh.position.set(m.Xc, footY+0.015, -m.Zm+m.Wc*0.42);
  };
  for(const m of meta.members){
    const t=await load(m.file);
    // 接地シャドウ(床に寝かせ手前に伸ばす=足手前の視差ギャップ帯を埋め浮きを消す)
    const smat=new THREE.MeshBasicMaterial({map:shTex,transparent:true,opacity:0.6,depthTest:true,depthWrite:false,side:THREE.DoubleSide});
    const sh=new THREE.Mesh(new THREE.PlaneGeometry(1,1), smat); sh.rotation.x=-Math.PI/2; sh.renderOrder=0.5; scene.add(sh);
    const mat=new THREE.MeshBasicMaterial({map:t,transparent:true,alphaTest:0.35,side:THREE.FrontSide,depthWrite:true});
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(1,1),mat); mesh.renderOrder=1; scene.add(mesh);
    const o={m,mesh,sh}; memObjs.push(o); applyMember(o);
  }

  // ---- dust ----
  const N=CFG.dust, dp=new Float32Array(N*3), dph=new Float32Array(N);
  for(let i=0;i<N;i++){const z=-(2.2+Math.random()*6.4);dp[i*3]=(Math.random()*2-1)*(-z)*0.55;dp[i*3+1]=-2+Math.random()*4.2;dp[i*3+2]=z;dph[i]=Math.random()*6.28;}
  const dg2=new THREE.BufferGeometry(); dg2.setAttribute('position',new THREE.BufferAttribute(dp,3));
  const dmat=new THREE.PointsMaterial({color:0xfff4e0,size:0.011,sizeAttenuation:true,transparent:true,opacity:0.55,blending:THREE.AdditiveBlending,depthWrite:false});
  const dust=new THREE.Points(dg2,dmat); scene.add(dust);
  const dbase=dp.slice();

  // ---- bloom ----
  const composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  const afterimage=new AfterimagePass(0.7); composer.addPass(afterimage);   // モーションブラー(動く時だけ)
  const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),CFG.bloom,0.7,0.75);
  composer.addPass(bloom);

  applyShift();
  document.getElementById('load').style.opacity=0;
  const enterEl=document.getElementById('enter');
  const DBG=new URLSearchParams(location.search).get('t')!=null||new URLSearchParams(location.search).has('edit');
  if(DBG){document.getElementById('load').style.display='none';started=true;}
  setTimeout(()=>{document.getElementById('load').style.display='none';if(!DBG)enterEl.style.display='flex';},900);
  enterEl.addEventListener('pointerdown',async()=>{
    if(typeof DeviceOrientationEvent!=='undefined'&&DeviceOrientationEvent.requestPermission){
      try{await DeviceOrientationEvent.requestPermission();}catch(e){}
    }
    enterEl.style.opacity=0; setTimeout(()=>enterEl.style.display='none',700);
    document.getElementById('hint').style.opacity=1; setTimeout(()=>{document.getElementById('hint').style.opacity=0;},6000);
    started=true; clock.start();
  },{once:true});

  // ---- interaction (gyro/touch parallax) ----
  let tx=0,ty=0,ptx=0,pty=0;
  const EDITMODE=new URLSearchParams(location.search).has('edit');
  addEventListener('deviceorientation',e=>{if(EDITMODE)return;if(e.gamma!=null){tx=Math.max(-1,Math.min(1,e.gamma/30));ty=Math.max(-1,Math.min(1,(e.beta-40)/30));}});
  addEventListener('pointermove',e=>{if(EDITMODE)return;tx=(e.clientX/innerWidth*2-1);ty=(e.clientY/innerHeight*2-1);});

  const eout=x=>{x=Math.min(1,Math.max(0,x));return 1-(1-x)**3;};
  const sstep=x=>{x=Math.min(1,Math.max(0,x));return x*x*x*(x*(x*6-15)+10);};   // ease-in-out(滑らか)
  const FREEZE=new URLSearchParams(location.search).get('t');   // ?t=秒 で固定(検証用)
  const EDIT=new URLSearchParams(location.search).has('edit');  // ?edit で手動配置モード

  // ================= 手動配置モード =================
  if(EDIT){
    started=true;
    if(meta.fit==null)meta.fit=0.74; if(meta.camY==null)meta.camY=0.05;
    if(meta.logoScale==null)meta.logoScale=1; if(meta.logoYoff==null)meta.logoYoff=0; if(meta.logoX==null)meta.logoX=0;
    const NAMES={m0:'まきと',m1:'りゅーすけ',m2:'潤弥',m3:'だいすけ',m4:'周平',m5:'まほろ',m6:'海野',m7:'ケンタ'};
    let sel=memObjs.length-1;   // 既定=ケンタ(前列)
    let target='member';        // member | camera | logo
    const ASPS=[['Fill',null],['16:9',16/9],['16:10',16/10],['21:9',21/9],['4:3',4/3],['iPhone',390/844]];
    forceAspect=16/9;           // 既定=横長で足まで見えやすく
    const key=o=>o.m.file.split('/').pop().replace('.png','');
    const panel=document.createElement('div');
    panel.style.cssText='position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,.84);color:#fff;font:12px/1.55 -apple-system,sans-serif;padding:10px 12px;border-radius:8px;max-width:270px;user-select:none';
    document.body.appendChild(panel);
    const btn=(label,on,extra)=>'<button '+extra+' style="padding:2px 6px;border:0;border-radius:4px;cursor:pointer;background:'+(on?'#3a7':'#444')+';color:#fff">'+label+'</button>';
    const draw=()=>{
      const o=memObjs[sel], m=o.m;
      let body='';
      if(target==='member'){
        body='<div style="margin:5px 0;display:flex;flex-wrap:wrap;gap:3px">'
          +memObjs.map((oo,i)=>btn(NAMES[key(oo)],i===sel,'data-mi="'+i+'"')).join('')+'</div>'
          +'選択: <span style="color:#7cf">'+NAMES[key(o)]+'('+key(o)+')</span><br>'
          +'dy(上下): '+(m.dy||0).toFixed(4)+' / X(左右): '+m.Xc.toFixed(3)+' / 大きさ: '+m.Wc.toFixed(3)
          +'<div style="margin-top:5px;color:#bbb;font-size:11px">↑↓=上下 ←→=左右 +/−=大きさ / 0〜7=人選択</div>';
      } else if(target==='camera'){
        body='<div style="color:#7cf;margin:4px 0">カメラ最終位置</div>'
          +'引き(fit): '+meta.fit.toFixed(3)+' / 上下(camY): '+meta.camY.toFixed(3)
          +'<div style="margin-top:5px;color:#bbb;font-size:11px">+/−=引き(大=引く/小=寄る)<br>↑↓=上下</div>';
      } else {
        body='<div style="color:#7cf;margin:4px 0">ロゴ</div>'
          +'大きさ: '+meta.logoScale.toFixed(3)+' / 上下: '+meta.logoYoff.toFixed(3)+' / 左右: '+meta.logoX.toFixed(3)
          +'<div style="margin-top:5px;color:#bbb;font-size:11px">+/−=大きさ ↑↓=上下 ←→=左右</div>';
      }
      panel.innerHTML='<b>配置モード</b>'
        +'<div style="margin:5px 0;display:flex;gap:3px">'+btn('メンバー',target==='member','data-t="member"')+btn('カメラ',target==='camera','data-t="camera"')+btn('ロゴ',target==='logo','data-t="logo"')+'</div>'
        +'<div style="margin:5px 0;display:flex;flex-wrap:wrap;gap:3px">アスペクト: '+ASPS.map(a=>btn(a[0],forceAspect===a[1],'data-a="'+(a[1]==null?'':a[1])+'"')).join('')+'</div>'
        +body
        +'<div style="margin-top:6px;font-size:11px">Shift=大きく動く <b style="color:#fe7">E=Export</b></div>';
      panel.querySelectorAll('[data-mi]').forEach(b=>b.onclick=()=>{sel=+b.dataset.mi;draw();});
      panel.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{target=b.dataset.t;draw();});
      panel.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{forceAspect=b.dataset.a===''?null:+b.dataset.a;if(window.__applyViewport)window.__applyViewport();draw();});
    };
    const exportJSON=()=>{
      const out={
        fit:+meta.fit.toFixed(4), camY:+meta.camY.toFixed(4),
        logoScale:+meta.logoScale.toFixed(4), logoYoff:+meta.logoYoff.toFixed(4), logoX:+meta.logoX.toFixed(4),
        members:meta.members.map(m=>({file:m.file,Xc:+m.Xc.toFixed(4),Yc:+m.Yc.toFixed(4),Zm:+m.Zm.toFixed(3),Wc:+m.Wc.toFixed(4),Hc:+m.Hc.toFixed(4),dy:+((m.dy||0)).toFixed(4),padFrac:m.padFrac||0}))
      };
      const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='kv_edited.json'; a.click();
      console.log(JSON.stringify(out));
    };
    addEventListener('keydown',e=>{
      if(e.key==='e'||e.key==='E'){exportJSON();return;}
      if(target==='member'&&e.key>='0'&&e.key<='7'){const i=+e.key;if(i<memObjs.length){sel=i;draw();}return;}
      let hit=true;
      if(target==='member'){
        const o=memObjs[sel], m=o.m, s=e.shiftKey?0.02:0.004;
        if(e.key==='ArrowUp')m.dy=(m.dy||0)+s; else if(e.key==='ArrowDown')m.dy=(m.dy||0)-s;
        else if(e.key==='ArrowLeft')m.Xc-=s; else if(e.key==='ArrowRight')m.Xc+=s;
        else if(e.key==='+'||e.key==='='){m.Wc*=1.015;m.Hc*=1.015;} else if(e.key==='-'||e.key==='_'){m.Wc/=1.015;m.Hc/=1.015;}
        else hit=false;
        if(hit)applyMember(o);
      } else if(target==='camera'){
        const s=e.shiftKey?0.04:0.01;
        if(e.key==='ArrowUp')meta.camY+=s; else if(e.key==='ArrowDown')meta.camY-=s;
        else if(e.key==='+'||e.key==='=')meta.fit=Math.max(0.2,meta.fit-(e.shiftKey?0.04:0.01));   // 寄る
        else if(e.key==='-'||e.key==='_')meta.fit=Math.min(2.0,meta.fit+(e.shiftKey?0.04:0.01));   // 引く
        else hit=false;
      } else {
        const s=e.shiftKey?0.04:0.008;
        if(e.key==='ArrowUp')meta.logoYoff+=s; else if(e.key==='ArrowDown')meta.logoYoff-=s;
        else if(e.key==='ArrowLeft')meta.logoX-=s; else if(e.key==='ArrowRight')meta.logoX+=s;
        else if(e.key==='+'||e.key==='=')meta.logoScale*=1.02; else if(e.key==='-'||e.key==='_')meta.logoScale/=1.02;
        else hit=false;
      }
      if(hit){e.preventDefault();draw();}
    });
    draw();
  }

  function frame(){
    const raw = FREEZE!=null?parseFloat(FREEZE):(started?clock.getElapsedTime():0);
    const el=EDIT?CFG.dur:(raw%CFG.dur), t2=el;
    // camera reveal (ヒーロー位置=アスペクトで自動フィット: 縦画面ほど引いて全員入れる)
    // グループを必ず余白付きで収めるフィットカメラ(どのアスペクトでも見切れ無し)
    const asp=VW/VH;
    const vt=Math.tan(camera.fov*Math.PI/360);
    const G=meta.group;
    const Dw=(G.halfW*(meta.fit||0.86))/(vt*Math.max(0.34,asp)), Dh=(G.halfH*(meta.fit||0.86))/vt;
    const D=Math.max(Dw,Dh,1.2);
    const hz=-G.gcz+D;                       // ヒーロー位置(寄せて迫力)
    const start=-(G.gcz+0.4);                 // メンバーの背後(片面カリングで無人)
    let z; if(t2<=CFG.revEnd) z=start+(hz-start)*sstep(t2/CFG.revEnd); else z=hz-0.25*eout((t2-CFG.revEnd)/(CFG.dur-CFG.revEnd));
    ptx+=(tx-ptx)*0.06; pty+=(ty-pty)*0.06;
    // 回り込み無し=真っ直ぐ-Z(板が見えない)。突き抜け中だけ小さく横スイング(収束)
    const rp=Math.min(1,t2/CFG.revEnd), wa=(1-rp)*(1-rp);
    const wx=Math.sin(rp*Math.PI*2.0)*0.8*wa;
    camera.position.set(G.gcx+wx+ptx*0.3, G.gcy+(meta.camY||0.15)-pty*0.2, z);
    camera.rotation.set(0,0,0);              // 真っ直ぐ(lookAt無し)
    applyShift();
    // ロゴをフレーム内上部へ自動配置+contain(幅と高さ両方に収める=全アスペクトで適正)
    { const Zl=L.z, dl=z+Zl, vH=vt*dl, vW=vt*Math.max(0.34,asp)*dl;
      const lw=Math.min(vW*0.82, vH*0.62/L.asp)*(meta.logoScale||1), lsc=lw/L.wl; logo.scale.set(lsc,lsc,1);
      const lH=L.wl*L.asp*lsc;
      logo.position.set(G.gcx+(meta.logoX||0)*vW, (G.gcy+(meta.camY||0.15))+vH-lH/2-vH*0.05+(meta.logoYoff||0)*vH, -Zl); }
    afterimage.uniforms['damp'].value = t2<CFG.revEnd ? 0.5 : 0.18;
    // logo appear @7s
    const la=Math.min(1,Math.max(0,(t2-7.0)/0.6)); lmat.opacity=la;
    // dust drift
    const tt=clock.getElapsedTime();
    for(let i=0;i<N;i++){dp[i*3]=dbase[i*3]+Math.sin(dph[i]+tt*0.5)*0.06;dp[i*3+1]=dbase[i*3+1]+Math.cos(dph[i]*1.3+tt*0.4)*0.05;}
    dg2.attributes.position.needsUpdate=true;
    composer.render();
    requestAnimationFrame(frame);
  }
  function applyViewport(){
    if(forceAspect){ let w=innerWidth,h=Math.round(w/forceAspect); if(h>innerHeight){h=innerHeight;w=Math.round(h*forceAspect);} VW=w;VH=h; }
    else { VW=innerWidth; VH=innerHeight; }
    renderer.setSize(VW,VH,false);
    const cs=renderer.domElement.style; cs.width=VW+'px'; cs.height=VH+'px'; cs.position='fixed';
    cs.left=Math.round((innerWidth-VW)/2)+'px'; cs.top=Math.round((innerHeight-VH)/2)+'px';
    camera.aspect=VW/VH; applyShift(); composer.setSize(VW,VH);
  }
  window.__applyViewport=applyViewport; applyViewport();
  frame();
  addEventListener('resize',applyViewport);
  window.__ready=true;
}
main();
</script>
